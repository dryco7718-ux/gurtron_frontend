kind = "web"
previewPath = "/"
title = "GurTron Institute"
version = "1.0.0"
id = "artifacts/gurukul"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19789

[services.development]
run = "pnpm --filter @workspace/gurukul run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gurukul", "run", "build" ]
publicDir = "artifacts/gurukul/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19789"
BASE_PATH = "/"
